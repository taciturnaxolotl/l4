name: Deploy L4

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  deployments: write

jobs:
  deploy:
    uses: taciturnaxolotl/dots/.github/workflows/deploy-service.yml@main
    with:
      service: l4
      health_url: https://l4.dunkirk.sh/health
      db_path: /var/lib/l4/data/stats.db
    secrets:
      TS_OAUTH_CLIENT_ID: ${{ secrets.TS_OAUTH_CLIENT_ID }}
      TS_OAUTH_SECRET: ${{ secrets.TS_OAUTH_SECRET }}
